<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #1a1a1a;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #4a90d9; }
    .input-row button {
      padding: 10px 20px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .input-row button:hover { background: #357abd; }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4a90d9;
      cursor: pointer;
      flex-shrink: 0;
    }
    li span {
      flex: 1;
      font-size: 16px;
      color: #333;
      transition: all 0.2s;
    }
    li.checked span {
      text-decoration: line-through;
      color: #aaa;
    }
    li button {
      background: none;
      border: none;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    li button:hover { color: #e74c3c; background: #fef0f0; }
    .empty {
      text-align: center;
      color: #aaa;
      padding: 32px 0;
      font-size: 15px;
    }
    .count {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요">
      <button onclick="addItem()">추가</button>
    </div>
    <ul id="list"></ul>
    <div id="count" class="count"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://zhefkttrnrsckuiskwav.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoZWZrdHRybnJzY2t1aXNrd2F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NjI1NzMsImV4cCI6MjA4OTQzODU3M30.B5hb9ZI3U94ZcNkcEzrhEOpsrw0eMnnpZqJrkpjTo-Y';
    const API = `${SUPABASE_URL}/rest/v1/shopping_items`;
    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let items = [];
    const input = document.getElementById('itemInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    async function loadItems() {
      const res = await fetch(`${API}?order=created_at.asc`, { headers });
      items = await res.json();
      render();
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.focus();
      const res = await fetch(API, {
        method: 'POST',
        headers,
        body: JSON.stringify({ text, checked: false })
      });
      const [newItem] = await res.json();
      items.push(newItem);
      render();
    }

    async function toggleItem(id) {
      const item = items.find(x => x.id === id);
      if (!item) return;
      item.checked = !item.checked;
      render();
      await fetch(`${API}?id=eq.${id}`, {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ checked: item.checked })
      });
    }

    async function deleteItem(id) {
      items = items.filter(x => x.id !== id);
      render();
      await fetch(`${API}?id=eq.${id}`, {
        method: 'DELETE',
        headers
      });
    }

    function render() {
      const list = document.getElementById('list');
      const countEl = document.getElementById('count');

      if (items.length === 0) {
        list.innerHTML = '<div class="empty">리스트가 비어 있습니다</div>';
        countEl.textContent = '';
        return;
      }

      const checkedCount = items.filter(x => x.checked).length;
      list.innerHTML = items.map(item => `
        <li class="${item.checked ? 'checked' : ''}">
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem(${item.id})">
          <span>${item.text.replace(/</g, '&lt;')}</span>
          <button onclick="deleteItem(${item.id})" title="삭제">&times;</button>
        </li>
      `).join('');
      countEl.textContent = `${checkedCount} / ${items.length} 완료`;
    }

    loadItems();
    input.focus();
  </script>
</body>
</html>
